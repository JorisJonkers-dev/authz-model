name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@extratoast"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install npm dependencies
        run: npm ci

      - name: Validate generated constants
        run: |
          npm run validate
          npm run check:generated
          npm run typecheck

      - name: Test Kotlin package
        run: ./gradlew test --no-daemon

      - name: Publish Maven artifact
        run: ./gradlew publish --no-daemon --no-parallel --max-workers=1
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish TypeScript package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --workspace packages/typescript --no-git-tag-version
          npm run build:typescript
          npm publish --workspace packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
