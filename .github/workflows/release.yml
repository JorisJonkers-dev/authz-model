name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    steps:
      - name: Create or update release
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: authz-model

  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install npm dependencies
        run: npm ci

      - name: Configure npm authentication
        run: |
          printf '%s\n' \
            '@extratoast:registry=https://npm.pkg.github.com' \
            "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Maven artifact
        run: |
          VERSION="${RELEASE_TAG#v}"
          ./gradlew publish -Pversion="$VERSION" --no-daemon --no-parallel --max-workers=1
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}

      - name: Publish TypeScript package
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --workspace packages/typescript --no-git-tag-version
          npm run build:typescript
          npm publish --workspace packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
