name: 'CI'

'on':
  pull_request:
  push:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: 'read'
  packages: 'read'

jobs:
  vocabulary:
    name: 'Validate Vocabulary'
    uses: 'JorisJonkers-dev/github-workflows/.github/workflows/node-ci.yml@v0.10.2'
    with:
      node-version: '22'
      package-manager: 'npm'
      install-command: 'npm ci'
      typecheck-command: 'npm run typecheck'
      build-command: 'npm run build:typescript'
      package-check-command: 'npm run validate && npm run generate -- --output-root "$RUNNER_TEMP/authz-generated" && npm run check:generated'
    secrets:
      packages-token: '${{ secrets.GITHUB_TOKEN }}'

  kotlin:
    name: 'Build Kotlin Artifact'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'

      - name: 'Setup Java'
        uses: 'actions/setup-java@v5'
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: 'Check Kotlin package'
        run: './gradlew check --no-daemon'

  workflow-lint:
    name: 'Lint Workflows'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'

      - name: 'Download actionlint'
        id: 'actionlint'
        shell: 'bash'
        run: 'bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)'

      - name: 'Lint GitHub Actions workflows'
        shell: 'bash'
        run: |
          "${{ steps.actionlint.outputs.executable }}" -color .github/workflows/*.yml

  pipeline-complete:
    name: 'Pipeline Complete'
    runs-on: 'ubuntu-latest'
    needs:
      - 'vocabulary'
      - 'kotlin'
      - 'workflow-lint'
    if: 'always()'
    steps:
      - name: 'Check gate results'
        uses: 're-actors/alls-green@release/v1'
        with:
          jobs: '${{ toJSON(needs) }}'
