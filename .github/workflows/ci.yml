name: 'CI'

'on':
  pull_request:
  push:
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: 'read'

jobs:
  vocabulary:
    name: 'Validate Vocabulary'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'

      - name: 'Setup Node'
        uses: 'actions/setup-node@v6'
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Install npm dependencies'
        run: 'npm ci'
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Validate schema and sample'
        run: 'npm run validate'

      - name: 'Run generator on sample'
        run: 'npm run generate -- --output-root "$RUNNER_TEMP/authz-generated"'

      - name: 'Check generated output'
        run: 'npm run check:generated'

      - name: 'Typecheck TypeScript constants'
        run: 'npm run typecheck'

  kotlin:
    name: 'Build Kotlin Artifact'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'

      - name: 'Setup Java'
        uses: 'actions/setup-java@v5'
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: 'Check Kotlin package'
        run: './gradlew check --no-daemon'

  workflow-lint:
    name: 'Lint Workflows'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6'

      - name: 'Download actionlint'
        id: 'actionlint'
        shell: 'bash'
        run: 'bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)'

      - name: 'Lint GitHub Actions workflows'
        shell: 'bash'
        run: |
          "${{ steps.actionlint.outputs.executable }}" -color .github/workflows/*.yml

  pipeline-complete:
    name: 'Pipeline Complete'
    runs-on: 'ubuntu-latest'
    needs:
      - 'vocabulary'
      - 'kotlin'
      - 'workflow-lint'
    if: 'always()'
    steps:
      - name: 'Check gate results'
        uses: 're-actors/alls-green@release/v1'
        with:
          jobs: '${{ toJSON(needs) }}'
