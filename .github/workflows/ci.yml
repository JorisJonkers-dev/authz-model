name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vocabulary:
    name: Validate Vocabulary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Validate schema and sample
        run: npm run validate

      - name: Run generator on sample
        run: npm run generate -- --output-root "$RUNNER_TEMP/authz-generated"

      - name: Check generated output
        run: npm run check:generated

      - name: Typecheck TypeScript constants
        run: npm run typecheck

  kotlin:
    name: Build Kotlin Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test Kotlin package
        run: ./gradlew test --no-daemon

  pipeline-complete:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs:
      - vocabulary
      - kotlin
    if: always()
    steps:
      - name: Check gate results
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
